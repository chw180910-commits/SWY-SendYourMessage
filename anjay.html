<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Send Your Message</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600&family=Baloo+2:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #f0f8ff; /* pastel blue */
      font-family: 'Quicksand', 'Baloo 2', cursive;
      text-align: center;
      color: #444;
      padding: 20px;
    }
    h1 {
      margin-top: 30px;
      font-weight: 600;
      color: #374151;
      font-size: 2rem;
    }
    p.tagline {
      margin-top: 10px;
      color: #6b7280;
      font-size: 1.1rem;
    }
    .button-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
      flex-wrap: wrap;
    }
    button {
      background-color: #fffaf0; /* pastel ivory */
      border: none;
      padding: 16px 32px;
      border-radius: 25px;
      font-size: 18px;
      font-family: 'Baloo 2', cursive;
      cursor: pointer;
      transition: 0.3s;
      color: #1e3a8a;
    }
    button:hover {
      background-color: #dbeafe; /* hover pastel blue */
    }
    #browse-section, #menfess-section {
      display: none;
      margin-top: 30px;
    }
    textarea, input {
      width: 90%;
      border-radius: 10px;
      padding: 12px;
      font-family: 'Quicksand', cursive;
      border: 1px solid #d1d5db;
      margin-top: 10px;
      font-size: 1rem;
    }
    textarea {
      height: 120px;
    }
    /* Responsive untuk HP */
    @media (max-width: 600px) {
      h1 { font-size: 1.6rem; }
      p.tagline { font-size: 1rem; }
      button { width: 100%; font-size: 16px; }
      textarea, input { width: 100%; }
    }
  </style>
</head>
<body>
  <h1>Send Your Message</h1>
  <p class="tagline">Say it with words, vibe it with songs — because feelings sound better with music.</p>

  <div class="button-container">
    <button id="browse-btn">Browse</button>
    <button id="menfess-btn">Menfess</button>
  </div>

  <!-- Browse Section -->
  <div id="browse-section">
    <h2>Search by Name</h2>
    <input type="text" id="searchName" placeholder="Type a name...">
    <button id="searchNameBtn">Go</button>
    <div id="browseResult"></div>
  </div>

  <!-- Menfess Section -->
  <div id="menfess-section">
    <h2>Write Your Menfess</h2>
    <textarea placeholder="Write your message..."></textarea><br>
    <input type="text" id="searchSong" placeholder="Find a song (Spotify later)">
    <button id="searchSongBtn">Search Song</button>
    <div id="songResult"></div><br>
    <button>Send</button>
  </div>

  <script>
    // toggle sections
    document.getElementById('browse-btn').addEventListener('click', () => {
      document.getElementById('browse-section').style.display = 'block';
      document.getElementById('menfess-section').style.display = 'none';
    });

    document.getElementById('menfess-btn').addEventListener('click', () => {
      document.getElementById('menfess-section').style.display = 'block';
      document.getElementById('browse-section').style.display = 'none';
    });

    // dummy search name
    document.getElementById('searchNameBtn').addEventListener('click', () => {
      const name = document.getElementById('searchName').value;
      document.getElementById('browseResult').innerHTML = "Results for: " + name;
    });

    // dummy search song (Spotify belum aktif)
    document.getElementById('searchSongBtn').addEventListener('click', () => {
      const song = document.getElementById('searchSong').value;
      document.getElementById('songResult').innerHTML = "Song search: " + song;
    });
  </script>
</body>
</html>
