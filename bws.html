<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <title>Send Your Message</title>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body {
      background-color: #f0f8ff; /* biru soft */
      font-family: 'Poppins', cursive;
      text-align: center;
      color: #333;
    }
    .button-container {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 40px;
    }
    button {
      background-color: #fffaf0; /* ivory */
      border: none;
      padding: 14px 28px;
      border-radius: 25px;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
    }
    button:hover {
      background-color: #dbeafe; /* hover biru lembut */
    }
    #menfess-form {
      display: none;
      margin-top: 30px;
    }
    textarea {
      width: 80%;
      height: 100px;
      border-radius: 10px;
      padding: 10px;
      font-family: 'Poppins', cursive;
    }
  </style>
</head>
<body>
  <h1>Send Your Message 💌</h1>
  <div class="button-container">
    <button id="browse-btn">Browse 🔍</button>
    <button id="menfess-btn">Menfess 💌</button>
  </div>

  <!-- Form Menfess -->
  <div id="menfess-form">
    <audio controls autoplay loop>
      <source src="lagu.mp3" type="audio/mpeg">
      Browsermu tidak mendukung audio.
    </audio>
    <p>Tulis pesanmu di sini:</p>
    <textarea placeholder="Ketik pesanmu..."></textarea><br>
    <button>Kirim</button>
  </div>

  <script>
    // tombol browse
    document.getElementById('browse-btn').addEventListener('click', () => {
      alert("Fitur pencarian nama aktif!");
      // nanti bisa diganti dengan fungsi search
    });

    // tombol menfess
    document.getElementById('menfess-btn').addEventListener('click', () => {
      document.getElementById('menfess-form').style.display = 'block';
    });
  </script>
</body>
</html>
